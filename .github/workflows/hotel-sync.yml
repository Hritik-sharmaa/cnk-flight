name: Hotel Sync

# Schedule summary (all times UTC = IST-5:30):
#   02:00 UTC daily  → incremental sync: new + updated + deleted hotels since yesterday
#   00:00 UTC Sunday → full sync: rebuild the lightweight hotel index (every 7 days)
#   03:00 UTC daily  → purge hotel_details_cache rows older than 24h
#
# Two-tier hotel content model (post 2026-07 Supabase disk-IO fix):
#   Tier 1 — hotels_inventory: lightweight fields only (name, city, rating,
#            hero image). Populated by the jobs below via
#            fetch-hotel-mapping-sync → fetch-hotel-content, but only the
#            lightweight projection is persisted — images/amenities/
#            descriptions/rooms/policies from that same response are fetched
#            and discarded here, not stored. Cheap enough to cover the whole
#            catalogue on a weekly cadence.
#   Tier 2 — hotel_details_cache: the heavy content (images, amenities,
#            descriptions, rooms, policies), fetched on demand via
#            static-detail only when a user actually opens a hotel, and
#            purged once a day after 24h — never bulk-synced.

on:
  schedule:
    - cron: '0 2 * * *'    # Daily 02:00 UTC (07:30 IST) — incremental index sync (new + updated + deleted)
    - cron: '0 0 * * 0'    # Weekly Sunday 00:00 UTC (05:30 IST) — full lightweight index rebuild
    - cron: '0 3 * * *'    # Daily 03:00 UTC (08:30 IST) — purge hotel_details_cache rows older than 24h

  workflow_dispatch:
    inputs:
      sync_type:
        description: 'Which sync to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all          # cities + full lightweight hotel index sync
          - cities
          - hotels-full  # full lightweight index rebuild, all hotels from 2020 onwards (weekly)
          - hotels-incremental  # only hotels added/changed since yesterday (lightweight index)
          - hotels-updated      # only hotels whose data changed since yesterday (lightweight index)
          - deleted
          - purge-detail-cache  # delete hotel_details_cache rows older than 24h

env:
  BASE_URL: ${{ secrets.HOTEL_SYNC_SERVER_URL }}
  API_KEY: ${{ secrets.INTERNAL_API_KEY }}

jobs:
  # ── Job 1: Full sync — runs weekly Sunday or manual 'all'/'hotels-full'/'cities' ──
  full-sync:
    name: Full Hotel Sync (Weekly)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * 0') ||
      (github.event_name == 'workflow_dispatch' && (
        inputs.sync_type == 'all' ||
        inputs.sync_type == 'cities' ||
        inputs.sync_type == 'hotels-full'
      ))

    steps:
      - name: Sync Cities
        if: >
          github.event_name == 'schedule' ||
          inputs.sync_type == 'all' ||
          inputs.sync_type == 'cities'
        id: sync_cities
        run: |
          echo "Starting city sync..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 30 \
            -X POST "$BASE_URL/api/v1/hotels/sync/cities" \
            -H "x-api-key: $API_KEY" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "HTTP $HTTP_CODE"

          [ "$HTTP_CODE" = "202" ] || { echo "City sync failed"; exit 1; }

          LOG_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('logId',''))" 2>/dev/null || echo "")
          echo "log_id=$LOG_ID" >> $GITHUB_OUTPUT
          echo "Sync started with logId=$LOG_ID"

      - name: Wait for City Sync
        if: steps.sync_cities.outputs.log_id != ''
        run: |
          LOG_ID="${{ steps.sync_cities.outputs.log_id }}"
          echo "Waiting 3 minutes for city sync to complete..."
          sleep 180

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 15 \
            "$BASE_URL/api/v1/hotels/sync/status/$LOG_ID" \
            -H "x-api-key: $API_KEY")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          STATUS=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('status',''))" 2>/dev/null || echo "")
          echo "City sync status: $STATUS"
          [ "$STATUS" = "success" ] || { echo "City sync did not complete successfully"; exit 1; }

      - name: Sync Hotels (full lightweight index — all hotels since 2020)
        if: >
          github.event_name == 'schedule' ||
          inputs.sync_type == 'all' ||
          inputs.sync_type == 'hotels-full'
        run: |
          echo "Starting full lightweight index sync (type=NEW, from 2020-01-01)..."
          echo "Uses: fetch-hotel-mapping-sync → fetch-hotel-content (5 concurrent batches),"
          echo "but only name/city/rating/hero-image are persisted — images/amenities/"
          echo "descriptions/rooms/policies are fetched and discarded, not stored."
          echo "Expected duration: a few minutes (no heavy content written)"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 2700 \
            -X POST "$BASE_URL/api/v1/hotels/sync/hotels?type=NEW&lastUpdateTime=2020-01-01T00:00:00Z" \
            -H "x-api-key: $API_KEY" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "HTTP $HTTP_CODE"

          [ "$HTTP_CODE" = "200" ] || { echo "Hotel sync failed"; exit 1; }

  # ── Job 2: Daily incremental — new hotels + deleted hotels since yesterday ───
  incremental-sync:
    name: Incremental Hotel Sync (Daily)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && (
        inputs.sync_type == 'hotels-incremental' ||
        inputs.sync_type == 'hotels-updated' ||
        inputs.sync_type == 'deleted'
      ))

    steps:
      - name: Compute since-timestamp
        id: ts
        run: |
          # Use yesterday 00:00 UTC. Adding a 2-hour buffer by going back 26 hours
          # so hotels updated near midnight are never missed between runs.
          SINCE=$(date -u -d '26 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          echo "since=$SINCE" >> $GITHUB_OUTPUT
          echo "Syncing hotels changed/deleted since $SINCE"

      - name: Sync New Hotels (incremental)
        if: >
          github.event_name == 'schedule' ||
          inputs.sync_type == 'hotels-incremental'
        id: sync_new
        run: |
          SINCE="${{ steps.ts.outputs.since }}"
          echo "Triggering new hotel sync since $SINCE..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 30 \
            -X POST "$BASE_URL/api/v1/hotels/sync/hotels?type=NEW&lastUpdateTime=${SINCE}" \
            -H "x-api-key: $API_KEY" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "HTTP $HTTP_CODE"

          [ "$HTTP_CODE" = "202" ] || { echo "Failed to trigger new hotel sync"; exit 1; }

          LOG_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('logId',''))" 2>/dev/null || echo "")
          echo "log_id=$LOG_ID" >> $GITHUB_OUTPUT
          echo "Sync started with logId=$LOG_ID"

      - name: Wait for New Hotel Sync
        if: steps.sync_new.outputs.log_id != ''
        run: |
          LOG_ID="${{ steps.sync_new.outputs.log_id }}"
          echo "Waiting 3 minutes for sync to complete..."
          sleep 180

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 15 \
            "$BASE_URL/api/v1/hotels/sync/status/$LOG_ID" \
            -H "x-api-key: $API_KEY")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          STATUS=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('status',''))" 2>/dev/null || echo "")
          echo "Sync status: $STATUS"
          [ "$STATUS" = "success" ] || { echo "New hotel sync did not complete successfully"; exit 1; }

      - name: Sync Updated Hotels (incremental)
        if: >
          github.event_name == 'schedule' ||
          inputs.sync_type == 'hotels-incremental' ||
          inputs.sync_type == 'hotels-updated'
        id: sync_updated
        run: |
          SINCE="${{ steps.ts.outputs.since }}"
          echo "Triggering updated hotel sync since $SINCE..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 30 \
            -X POST "$BASE_URL/api/v1/hotels/sync/hotels?type=UPDATE&lastUpdateTime=${SINCE}" \
            -H "x-api-key: $API_KEY" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "HTTP $HTTP_CODE"

          [ "$HTTP_CODE" = "202" ] || { echo "Failed to trigger updated hotel sync"; exit 1; }

          LOG_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('logId',''))" 2>/dev/null || echo "")
          echo "log_id=$LOG_ID" >> $GITHUB_OUTPUT
          echo "Sync started with logId=$LOG_ID"

      - name: Wait for Updated Hotel Sync
        if: steps.sync_updated.outputs.log_id != ''
        run: |
          LOG_ID="${{ steps.sync_updated.outputs.log_id }}"
          echo "Waiting 5 minutes for sync to complete..."
          sleep 300

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 15 \
            "$BASE_URL/api/v1/hotels/sync/status/$LOG_ID" \
            -H "x-api-key: $API_KEY")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          STATUS=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('status',''))" 2>/dev/null || echo "")
          echo "Sync status: $STATUS"
          [ "$STATUS" = "success" ] || { echo "Updated hotel sync did not complete successfully"; exit 1; }

      - name: Sync Deleted Hotels
        if: >
          github.event_name == 'schedule' ||
          inputs.sync_type == 'hotels-incremental' ||
          inputs.sync_type == 'deleted'
        id: sync_deleted
        run: |
          SINCE="${{ steps.ts.outputs.since }}"
          echo "Triggering deleted hotel sync since $SINCE..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 30 \
            -X POST "$BASE_URL/api/v1/hotels/sync/hotels-deleted?lastUpdateTime=${SINCE}" \
            -H "x-api-key: $API_KEY" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "HTTP $HTTP_CODE"

          [ "$HTTP_CODE" = "202" ] || { echo "Failed to trigger deleted hotel sync"; exit 1; }

          LOG_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('logId',''))" 2>/dev/null || echo "")
          echo "log_id=$LOG_ID" >> $GITHUB_OUTPUT
          echo "Sync started with logId=$LOG_ID"

      - name: Wait for Deleted Hotel Sync
        if: steps.sync_deleted.outputs.log_id != ''
        run: |
          LOG_ID="${{ steps.sync_deleted.outputs.log_id }}"
          echo "Waiting 2 minutes for sync to complete..."
          sleep 120

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 15 \
            "$BASE_URL/api/v1/hotels/sync/status/$LOG_ID" \
            -H "x-api-key: $API_KEY")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          STATUS=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('status',''))" 2>/dev/null || echo "")
          echo "Sync status: $STATUS"
          [ "$STATUS" = "success" ] || { echo "Deleted hotel sync did not complete successfully"; exit 1; }

  # ── Job 3: Daily purge — delete hotel_details_cache rows older than 24h ──────
  purge-detail-cache:
    name: Purge Expired Hotel Detail Cache (Daily)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.sync_type == 'purge-detail-cache')

    steps:
      - name: Purge expired detail cache
        run: |
          echo "Purging hotel_details_cache rows older than 24h..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 30 \
            -X POST "$BASE_URL/api/v1/hotels/sync/purge-detail-cache" \
            -H "x-api-key: $API_KEY" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "HTTP $HTTP_CODE"

          [ "$HTTP_CODE" = "200" ] || { echo "Purge failed"; exit 1; }
