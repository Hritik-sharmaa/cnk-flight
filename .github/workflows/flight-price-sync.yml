name: Flight Price Sync

# Nightly refresh of Delhi-origin indicative flight prices for includes_flight
# packages in cnk-website. Writes directly into cnk-website's Supabase
# `departures.flight_price_del` / `flight_price_updated_at` columns — same
# project cnk-flight already holds credentials for. Mirrors hotel-sync.yml's
# trigger-and-poll shape.

on:
  schedule:
    - cron: '30 20 * * *'   # 20:30 UTC = 02:00 IST — nightly

  workflow_dispatch: {}      # manual escape hatch if the schedule is delayed/missed

env:
  BASE_URL: ${{ secrets.HOTEL_SYNC_SERVER_URL }}
  API_KEY: ${{ secrets.INTERNAL_API_KEY }}

jobs:
  sync:
    name: Sync Delhi Flight Prices
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Trigger Delhi fare sync
        id: trigger
        run: |
          echo "Starting Delhi flight price sync..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 30 \
            -X POST "$BASE_URL/api/v1/flights/sync/delhi-fares" \
            -H "x-api-key: $API_KEY" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "HTTP $HTTP_CODE"

          [ "$HTTP_CODE" = "202" ] || { echo "Failed to trigger Delhi fare sync"; exit 1; }

          LOG_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('logId',''))" 2>/dev/null || echo "")
          echo "log_id=$LOG_ID" >> $GITHUB_OUTPUT
          echo "Sync started with logId=$LOG_ID"

      - name: Wait for Delhi fare sync
        if: steps.trigger.outputs.log_id != ''
        run: |
          LOG_ID="${{ steps.trigger.outputs.log_id }}"

          # Every package needs its own live provider search, so this can run
          # considerably longer than a hotel content sync page — poll instead
          # of a single fixed sleep.
          for i in $(seq 1 20); do
            sleep 180
            echo "Poll attempt $i — checking sync status..."

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              --max-time 15 \
              "$BASE_URL/api/v1/flights/sync/status/$LOG_ID" \
              -H "x-api-key: $API_KEY")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

            STATUS=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('status',''))" 2>/dev/null || echo "")
            echo "Sync status: $STATUS"

            if [ "$STATUS" = "success" ]; then
              echo "Delhi fare sync completed successfully."
              exit 0
            fi
            if [ "$STATUS" = "failed" ]; then
              echo "Delhi fare sync failed — stale prices remain in place (safe fallback)."
              exit 1
            fi
          done

          echo "Delhi fare sync did not report completion within the poll window — check status manually via GET .../status/$LOG_ID"
          exit 1
